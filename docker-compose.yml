# Local-dev compose for Slice 1 (Step 1.13): db + migrate + app + localstack.
#
# Host port for db is 5433 (not 5432) deliberately: many dev machines already
# run a native PostgreSQL on 5432, which would shadow this container and cause
# confusing "password authentication failed" errors. 5433 sidesteps that.
# Inside the compose network, services reach Postgres at db:5432 (the internal
# port) -- the 5433 mapping is only for host-side access.
#
# Quick starts:
#   docker compose up -d db                 # just Postgres (for pytest -m integration)
#   docker compose run --rm migrate         # apply schema
#   docker compose up --build app           # build + run one full scan (db + migrate auto-start)
#   docker compose up --build               # bring up everything incl. localstack
#   docker compose down -v                  # stop and wipe data
#
# The `app` service is one-shot: it runs a single scan and exits, mirroring the
# production model where EventBridge launches one Fargate task per scan.
#
# Secrets come from .env (gitignored). DATABASE_URL is overridden per-service
# to db:5432 because containers talk to Postgres over the compose network, not
# via the host's 5433 mapping.

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: signals-db
    environment:
      POSTGRES_USER: signals
      POSTGRES_PASSWORD: signals
      POSTGRES_DB: signals
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signals -d signals"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot schema migration. Runs to completion, then exits 0. The `app`
  # service waits for this via `service_completed_successfully`.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: crypto-signals:latest
    container_name: signals-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://signals:signals@db:5432/signals
    entrypoint: ["python", "scripts/migrate.py"]
    restart: "no"

  # One-shot scan: Binance -> analyzer -> live Anthropic -> Postgres -> Telegram.
  # Exits 0 on success. Override the symbol with:
  #   docker compose run --rm app --symbol ETHUSDT
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: crypto-signals:latest
    container_name: signals-app
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Secrets + scan config from .env; DATABASE_URL overridden for the network.
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://signals:signals@db:5432/signals
    restart: "no"

  # LocalStack stands in for AWS services (S3, Secrets Manager, ...). Slice 1's
  # scan runner does not call AWS yet, so `app` does not depend on it; it is
  # included per SPEC Step 1.13 so `docker compose up` brings up the full
  # intended topology. Slice 2+ wires real AWS calls through this.
  localstack:
    image: localstack/localstack:3
    container_name: signals-localstack
    environment:
      SERVICES: s3,secretsmanager
      DEBUG: "0"
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
