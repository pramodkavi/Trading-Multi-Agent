# Continuous deployment to the dev account (Slice 1 Step 1.21).
#
# Triggered when the CI workflow completes successfully on main (workflow_run is
# the faithful "after CI passes" trigger). Deploys all stacks to the dev account.
#
# Why no separate docker-build / ECR-push step: ComputeStack uses
# DockerImageCode.from_image_asset, so `cdk deploy` builds the Lambda image and
# pushes it to the CDK-managed ECR asset repo itself (ubuntu-latest has Docker).
#
# DB schema migration runs automatically BEFORE `cdk deploy` (Slice 2): the
# schema is additive + idempotent and must exist before the new Lambda code
# (which INSERTs the new columns) goes live. The cluster/secret ARNs are
# discovered from the DataStack's CloudFormation outputs, so there is nothing
# to configure per environment. See docs/PROJECT_STATE.md §4.
#
# Auth is keyless via GitHub OIDC -> an AWS IAM role (no long-lived keys).
#
# One-time prerequisites (configured outside this repo):
#   - `cdk bootstrap` the dev environment, trusting the deploy role.
#   - GitHub repo secret  AWS_DEPLOY_ROLE_ARN  = the dev OIDC deploy role ARN.
#   - GitHub repo variable AWS_REGION          = e.g. us-east-1.
#   - GitHub Environment "dev".

name: Deploy (dev)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Never run two dev deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  id-token: write # required for OIDC
  contents: read

jobs:
  deploy:
    name: cdk deploy (dev)
    # Only deploy if the CI run actually succeeded.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          # Deploy exactly the commit CI validated, not the branch tip.
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CDK app dependencies
        run: pip install -r infrastructure/requirements.txt

      - name: Install the migration runner (project package)
        # scripts/migrate.py imports the project; -e gives it psycopg + boto3
        # (both base deps) and the runtime src package. Pip cache makes repeats fast.
        run: pip install -e .

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install the CDK CLI
        run: npm install -g aws-cdk@2.1126.0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Apply DB schema migration (Data API, before deploy)
        env:
          DATA_STACK: CryptoSignals-Data
        run: |
          set -euo pipefail
          # First-ever deploy: the cluster doesn't exist yet. Skip — `cdk deploy`
          # creates it, and the schema applies on the next deploy.
          if ! aws cloudformation describe-stacks --stack-name "$DATA_STACK" >/dev/null 2>&1; then
            echo "::notice::$DATA_STACK not found — skipping pre-deploy migration (first deploy?)."
            exit 0
          fi
          q() { aws cloudformation describe-stacks --stack-name "$DATA_STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue | [0]" --output text; }
          CLUSTER_ARN=$(q ClusterArn)
          SECRET_ARN=$(q DbSecretArn)
          DB_NAME=$(q DatabaseName)
          if [ -z "$CLUSTER_ARN" ] || [ "$CLUSTER_ARN" = "None" ] || [ -z "$SECRET_ARN" ] || [ "$SECRET_ARN" = "None" ]; then
            echo "::error::Could not resolve ClusterArn/DbSecretArn from $DATA_STACK outputs."
            exit 1
          fi
          if [ -z "$DB_NAME" ] || [ "$DB_NAME" = "None" ]; then DB_NAME=signals; fi
          echo "Applying schema to $CLUSTER_ARN (db=$DB_NAME)"
          # Retry to ride out Aurora Serverless v2 scale-to-zero: the first Data
          # API call after idle throws DatabaseResumingException while it wakes.
          for attempt in 1 2 3 4 5; do
            if python -m scripts.migrate --backend dataapi \
                 --cluster-arn "$CLUSTER_ARN" --secret-arn "$SECRET_ARN" --db-name "$DB_NAME"; then
              echo "Migration applied."
              exit 0
            fi
            echo "::warning::Migration attempt $attempt failed (Aurora resuming?); retrying in 20s."
            sleep 20
          done
          echo "::error::Migration failed after 5 attempts."
          exit 1

      - name: Deploy all stacks
        working-directory: infrastructure
        run: |
          set -euo pipefail
          # One-time cross-stack export transition (Step 2.12). Step 2.12 moved the
          # Anthropic/Telegram API keys from Secrets Manager to SSM, which removed
          # the secret-ARN CloudFormation *exports* DataStack published and
          # ComputeStack imported. CloudFormation cannot delete an export that is
          # still imported, and `cdk deploy --all` updates the producer (Data)
          # BEFORE the consumer (Compute) -- so a plain `--all` fails with
          # "Export ... cannot be deleted as it is in use by CryptoSignals-Compute".
          # Fix: deploy Compute FIRST (dropping the imports) so the subsequent
          # `--all` lets Data drop the now-unused exports.
          #
          # Run Compute-first UNCONDITIONALLY and tolerate failure: `cdk` deploys to
          # the region PINNED in app.py (ap-south-1) no matter the CLI default
          # region, so we must not gate on `aws cloudformation describe-stacks` --
          # that queries the CLI default region (vars.AWS_REGION) and silently skips
          # the step when that differs from the pinned deploy region (which is what
          # made the first attempt at this fix a no-op). On a first-ever (fresh)
          # deploy Compute cannot precede Data, so the command fails harmlessly and
          # we fall through to `--all`, which creates everything.
          # TRANSITIONAL: revert to a plain `cdk deploy --all` once dev is on 2.12
          # (a permanent Compute-first would break a FUTURE new Data->Compute ref).
          if cdk deploy CryptoSignals-Compute --exclusively --require-approval never; then
            echo "::notice::Deployed CryptoSignals-Compute first; cross-stack secret imports released."
          else
            echo "::warning::Compute-first deploy did not succeed (fresh environment, or see the error above) -- continuing with --all."
          fi
          cdk deploy --all --require-approval never
