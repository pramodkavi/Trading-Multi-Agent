# Continuous deployment to the production account (Slice 1 Step 1.21).
#
# Triggered on a version tag push (v*.*.*), per CLAUDE.md §10. Same flow as the
# dev deploy, with a MANUAL APPROVAL GATE: the job targets the "production"
# GitHub Environment, whose protection rule (required reviewers) blocks the run
# until a human approves. The approval is configured in repo settings, not here.
#
# As with dev, `cdk deploy` builds and pushes the Lambda image asset itself, and
# the DB schema migration runs automatically BEFORE `cdk deploy` (additive +
# idempotent; ARNs discovered from the DataStack's CloudFormation outputs).
#
# One-time prerequisites (configured outside this repo):
#   - `cdk bootstrap` the prod environment, trusting the prod deploy role.
#   - GitHub repo secret  AWS_PROD_DEPLOY_ROLE_ARN = the prod OIDC deploy role ARN.
#   - GitHub repo variable AWS_PROD_REGION         = e.g. us-east-1.
#   - GitHub Environment "production" with required reviewers (the approval gate).

name: Deploy (prod)

on:
  push:
    tags: ["v*.*.*"]

# Never run two prod deploys at once.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write # required for OIDC
  contents: read

jobs:
  deploy:
    name: cdk deploy (prod)
    runs-on: ubuntu-latest
    # The "production" environment's required-reviewers rule is the manual
    # approval gate; the job pauses here until a reviewer approves.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CDK app dependencies
        run: pip install -r infrastructure/requirements.txt

      - name: Install the migration runner (project package)
        # scripts/migrate.py imports the project; -e gives it psycopg + boto3
        # (both base deps) and the runtime src package. Pip cache makes repeats fast.
        run: pip install -e .

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install the CDK CLI
        run: npm install -g aws-cdk@2.1126.0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_PROD_REGION }}

      - name: Apply DB schema migration (Data API, before deploy)
        env:
          DATA_STACK: CryptoSignals-Data
        run: |
          set -euo pipefail
          # First-ever deploy: the cluster doesn't exist yet. Skip — `cdk deploy`
          # creates it, and the schema applies on the next deploy.
          if ! aws cloudformation describe-stacks --stack-name "$DATA_STACK" >/dev/null 2>&1; then
            echo "::notice::$DATA_STACK not found — skipping pre-deploy migration (first deploy?)."
            exit 0
          fi
          q() { aws cloudformation describe-stacks --stack-name "$DATA_STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue | [0]" --output text; }
          CLUSTER_ARN=$(q ClusterArn)
          SECRET_ARN=$(q DbSecretArn)
          DB_NAME=$(q DatabaseName)
          if [ -z "$CLUSTER_ARN" ] || [ "$CLUSTER_ARN" = "None" ] || [ -z "$SECRET_ARN" ] || [ "$SECRET_ARN" = "None" ]; then
            echo "::error::Could not resolve ClusterArn/DbSecretArn from $DATA_STACK outputs."
            exit 1
          fi
          if [ -z "$DB_NAME" ] || [ "$DB_NAME" = "None" ]; then DB_NAME=signals; fi
          echo "Applying schema to $CLUSTER_ARN (db=$DB_NAME)"
          # Retry to ride out Aurora Serverless v2 scale-to-zero: the first Data
          # API call after idle throws DatabaseResumingException while it wakes.
          for attempt in 1 2 3 4 5; do
            if python -m scripts.migrate --backend dataapi \
                 --cluster-arn "$CLUSTER_ARN" --secret-arn "$SECRET_ARN" --db-name "$DB_NAME"; then
              echo "Migration applied."
              exit 0
            fi
            echo "::warning::Migration attempt $attempt failed (Aurora resuming?); retrying in 20s."
            sleep 20
          done
          echo "::error::Migration failed after 5 attempts."
          exit 1

      - name: Deploy all stacks
        working-directory: infrastructure
        run: cdk deploy --all --require-approval never
